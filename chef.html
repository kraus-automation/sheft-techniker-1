<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AufzugProfi — Chef</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F8F8F6;--surface:#FFFFFF;--border:#E0DED8;
  --primary:#3C3489;--pl:#EEEDFE;--pm:#534AB7;
  --text:#1A1A18;--muted:#6B6966;
  --green:#27500A;--gbg:#EAF3DE;--gborder:#97C459;
  --red:#791F1F;--rbg:#FCEBEB;--rborder:#F09595;
  --orange:#633806;--obg:#FAEEDA;--oborder:#EF9F27;
  --radius:12px;--rsm:8px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px}
#app{max-width:700px;margin:0 auto;padding:14px}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.hdr-t{font-size:19px;font-weight:600}
.hdr-s{font-size:11px;color:var(--muted);margin-top:2px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.card-lbl{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}

/* Suche */
.search-wrap{position:relative;margin-bottom:8px}
.search-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:var(--rsm);font-size:15px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s}
.search-input:focus{border-color:var(--primary)}
.sugg{position:absolute;top:100%;left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--rsm);z-index:100;max-height:320px;overflow-y:auto;box-shadow:0 4px 16px rgba(0,0,0,.1);display:none}
.sugg.show{display:block}
.si{padding:11px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.si:last-child{border-bottom:none}
.si:hover,.si:active{background:var(--pl)}
.si-info{flex:1}
.si-street{font-size:14px;font-weight:500;color:var(--text)}
.si-meta{font-size:12px;color:var(--muted);margin-top:2px}
.si-badge{padding:2px 8px;border-radius:8px;font-size:11px;font-weight:500;background:var(--pl);color:var(--primary);flex-shrink:0}
.si-add{width:28px;height:28px;border-radius:50%;background:var(--primary);color:#EEEDFE;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.no-res{padding:14px;text-align:center;font-size:13px;color:var(--muted)}

/* Ausgewählte Liste */
.sel-list{min-height:60px}
.sel-empty{text-align:center;padding:20px;color:var(--muted);font-size:13px;border:2px dashed var(--border);border-radius:var(--rsm)}
.sel-item{display:flex;align-items:center;gap:8px;padding:10px 12px;border:1px solid var(--border);border-radius:var(--rsm);margin-bottom:6px;background:var(--surface);cursor:grab;transition:all .15s;user-select:none}
.sel-item:active{cursor:grabbing;box-shadow:0 4px 12px rgba(0,0,0,.1);transform:scale(1.01)}
.sel-item.dragging{opacity:.5;border-style:dashed}
.sel-item.drag-over{border-color:var(--primary);background:var(--pl)}
.drag-handle{color:var(--muted);font-size:16px;cursor:grab;flex-shrink:0;padding:2px 4px}
.sel-num{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#EEEDFE;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sel-info{flex:1;min-width:0}
.sel-street{font-size:14px;font-weight:500;color:var(--text)}
.sel-meta{font-size:12px;color:var(--muted);margin-top:1px}
.sel-remove{width:26px;height:26px;border:none;background:none;color:var(--muted);cursor:pointer;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;border-radius:6px}
.sel-remove:hover{background:var(--rbg);color:var(--red)}

/* Route Chips */
.route-chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.rc{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);font-size:12px;color:var(--muted)}
.rc.has{background:var(--primary);border-color:var(--primary);color:#EEEDFE;font-weight:500}

/* Buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 20px;border-radius:var(--rsm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;transition:all .15s;width:100%}
.btn:active{transform:scale(0.98)}
.btn-p{background:var(--primary);border-color:var(--primary);color:#EEEDFE}
.btn-p:hover{background:var(--pm)}
.btn-g{background:var(--gbg);border-color:var(--gborder);color:var(--green)}
.btn-sm{padding:8px 14px;font-size:13px;width:auto}
.btn-row{display:flex;gap:8px;margin-top:10px}

/* FB Status */
.fb-dot{width:8px;height:8px;border-radius:50%;background:var(--muted);display:inline-block;margin-right:4px}
.fb-dot.ok{background:#3B6D11}

/* Datum */
.datum-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.datum-row label{font-size:13px;color:var(--muted);white-space:nowrap}
.datum-row input{padding:8px 12px;border:1px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);outline:none}
.datum-row input:focus{border-color:var(--primary)}

/* Bemerkung */
.bem-inp{width:100%;padding:8px 12px;border:1px solid var(--border);border-radius:var(--rsm);font-size:13px;font-family:inherit;color:var(--text);background:var(--surface);outline:none;margin-top:6px}
.bem-inp:focus{border-color:var(--primary)}

/* Status Toast */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:var(--rsm);font-size:13px;font-weight:500;z-index:999;display:none;white-space:nowrap}
.toast.ok{background:var(--gbg);border:1px solid var(--gborder);color:var(--green);display:block}
.toast.err{background:var(--rbg);border:1px solid var(--rborder);color:var(--red);display:block}
</style>
</head>
<body>
<div id="app">
  <div class="hdr">
    <div>
      <div class="hdr-t">👔 Chef — Tagesplan</div>
      <div class="hdr-s"><span class="fb-dot" id="fb-dot"></span><span id="fb-txt">Verbinde...</span></div>
    </div>
    <a href="index.html" style="font-size:12px;color:var(--primary);text-decoration:none">← Start</a>
  </div>

  <!-- Datum -->
  <div class="card">
    <div class="card-lbl">Datum & Techniker</div>
    <div class="datum-row">
      <label>Datum:</label>
      <input type="date" id="plan-datum">
      <label>Für:</label>
      <input type="text" id="plan-tech" placeholder="z.B. Kraus" style="flex:1">
    </div>
  </div>

  <!-- Suche -->
  <div class="card">
    <div class="card-lbl">Adressen suchen & hinzufügen</div>
    <div class="search-wrap">
      <input class="search-input" id="search" placeholder="Straße, Nr. oder Stadt eingeben…"
        autocomplete="off" autocorrect="off" spellcheck="false"
        oninput="onSearch()" onfocus="onSearch()" onblur="hideDelay()">
      <div class="sugg" id="sugg"></div>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-top:4px">Tipp: "Pr" findet zuerst <strong>Pr</strong>omenade, dann Horn<strong>sch</strong>uchpromenade</div>
  </div>

  <!-- Route Übersicht -->
  <div class="card">
    <div class="card-lbl">Route-Übersicht</div>
    <div class="route-chips" id="route-chips"></div>
  </div>

  <!-- Ausgewählte Liste -->
  <div class="card">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div class="card-lbl" style="margin:0">Tagesplan (<span id="sel-count">0</span> Adressen)</div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm" onclick="sortRoute()">🗺 Route sortieren</button>
        <button class="btn btn-sm" style="color:var(--red)" onclick="clearAll()">✕ Alle</button>
      </div>
    </div>
    <div id="sel-list">
      <div class="sel-empty">Noch keine Adressen. Oben suchen und hinzufügen.</div>
    </div>
    <div class="btn-row">
      <button class="btn btn-p" onclick="sendPlan()" id="btn-send">📤 An Techniker senden</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function nm(s){return s.toLowerCase().replace(/[.\-\/\s]/g,'')}

function onSearch(){
  const q=document.getElementById('search').value.trim();
  const sg=document.getElementById('sugg');
  if(q.length<1){sg.classList.remove('show');return}
  const ql=q.toLowerCase();
  const qn=nm(q);

  // Verbesserter Score: beginnt mit = 0, enthält = 1
  const scored=ALL.map(c=>{
    const sl=c.s.toLowerCase();
    const sn=nm(c.s);
    const cl=c.c.toLowerCase();
    let score=99;
    if(sl.startsWith(ql)) score=0;
    else if(sn.startsWith(qn)) score=1;
    else if(sl.includes(ql)) score=2;
    else if(sn.includes(qn)) score=3;
    else if(cl.includes(ql)) score=4;
    else if(c.n.includes(q)) score=5;
    else return null;
    return{...c,_score:score};
  }).filter(Boolean);

  scored.sort((a,b)=>a._score-b._score||a.s.localeCompare(b.s));
  const res=scored.slice(0,15);

  if(!res.length){sg.innerHTML='<div class="no-res">Keine Treffer</div>';}
  else{
    sg.innerHTML=res.map((c,i)=>`
      <div class="si" onmousedown="addItem(${i})">
        <div class="si-info">
          <div class="si-street">${hl(c.s,q)} <strong>${c.n}</strong></div>
          <div class="si-meta">${c.c} · ${c._m}</div>
        </div>
        <span class="si-badge">${c.t||'?'}</span>
        <button class="si-add">+</button>
      </div>`).join('');
    sg._r=res;
  }
  sg.classList.add('show');
}

function hl(str,q){
  const i=str.toLowerCase().indexOf(q.toLowerCase());
  if(i<0)return str;
  return str.slice(0,i)+'<strong style="color:var(--primary)">'+str.slice(i,i+q.length)+'</strong>'+str.slice(i+q.length);
}

function addItem(i){
  const sg=document.getElementById('sugg');
  const c=sg._r[i];
  if(!selected.some(s=>s.s===c.s&&s.n===c.n&&s.c===c.c)){
    selected.push({...c,bem:''});
    renderSelected();
    updateRouteChips();
  }
  document.getElementById('search').value='';
  sg.classList.remove('show');
}

function hideDelay(){setTimeout(()=>document.getElementById('sugg').classList.remove('show'),200)}

  document.getElementById('sel-count').textContent=selected.length;
  if(!selected.length){
    wrap.innerHTML='<div class="sel-empty">Noch keine Adressen ausgewählt.</div>';
    return;
  }
  wrap.innerHTML=selected.map((o,i)=>`
    <div class="sel-item" id="si${i}" draggable="true"
      ondragstart="dragStart(${i})" ondragover="dragOver(event,${i})"
      ondrop="drop(${i})" ondragend="dragEnd()">
      <span class="drag-handle">⠿</span>
      <div class="sel-num">${i+1}</div>
      <div class="sel-info">
        <div class="sel-street">${o.s} ${o.n}</div>
        <div class="sel-meta">${o.c} · ${o._m} · ${o.t}</div>
        <input class="bem-inp" placeholder="Bemerkung (optional)…" value="${o.bem||''}"
          onchange="selected[${i}].bem=this.value" onclick="event.stopPropagation()">
      </div>
      <button class="sel-remove" onclick="removeItem(${i})">✕</button>
    </div>`).join('');
}

function removeItem(i){selected.splice(i,1);renderSelected();updateRouteChips();}
function clearAll(){if(selected.length&&!confirm('Alle entfernen?'))return;selected=[];renderSelected();updateRouteChips();}

// ── Drag & Drop ───────────────────────────────────────────────────
function dragStart(i){dragIdx=i;document.getElementById('si'+i).classList.add('dragging');}
function dragOver(e,i){e.preventDefault();document.querySelectorAll('.sel-item').forEach(el=>el.classList.remove('drag-over'));document.getElementById('si'+i)?.classList.add('drag-over');}
function drop(i){
  if(dragIdx===null||dragIdx===i)return;
  const item=selected.splice(dragIdx,1)[0];
  selected.splice(i,0,item);
  renderSelected();updateRouteChips();
}
function dragEnd(){dragIdx=null;document.querySelectorAll('.sel-item').forEach(el=>{el.classList.remove('dragging');el.classList.remove('drag-over');});}

// ── Route sortieren ───────────────────────────────────────────────
function sortRoute(){
  selected.sort((a,b)=>{
    const ra=ROUTE.indexOf(a.c);
    const rb=ROUTE.indexOf(b.c);
    const ia=ra===-1?99:ra;
    const ib=rb===-1?99:rb;
    if(ia!==ib)return ia-ib;
    return a.s.localeCompare(b.s);
  });
  renderSelected();
  updateRouteChips();
  showToast('Route sortiert ✓','ok');
}

function updateRouteChips(){
  const cities=[...new Set(selected.map(o=>o.c))];
  const sorted=[...cities].sort((a,b)=>{
    const ra=ROUTE.indexOf(a),rb=ROUTE.indexOf(b);
    return (ra===-1?99:ra)-(rb===-1?99:rb);
  });
  document.getElementById('route-chips').innerHTML=
    sorted.length
      ? sorted.map(c=>`<span class="rc has">📍 ${c} (${selected.filter(o=>o.c===c).length})</span>`).join('')+'<span class="rc">→ Heimweg</span>'
      : '<span style="font-size:12px;color:var(--muted)">Noch keine Adressen</span>';
}

// ── An Firebase senden ────────────────────────────────────────────
async function sendPlan(){
  if(!selected.length){showToast('Bitte zuerst Adressen auswählen','err');return;}
  if(!window._fbReady){showToast('Firebase nicht bereit','err');return;}

  const btn=document.getElementById('btn-send');
  btn.textContent='📤 Sende...';
  btn.disabled=true;

  const plan={
    datum: document.getElementById('plan-datum').value,
    techniker: document.getElementById('plan-tech').value.trim()||'Kraus',
    ts: new Date().toISOString(),
    tsDisplay: new Date().toLocaleString('de-DE'),
    adressen: selected.map((o,i)=>({
      idx:i, s:o.s, n:o.n, c:o.c, t:o.t, _m:o._m, bem:o.bem||'',
      done:false, doneTs:''
    }))
  };

  try {
    const key=plan.datum+'_'+plan.techniker.toLowerCase();
    await window._setDoc(window._doc(window._db,'tagespläne',key), plan);
    showToast(`✓ Plan gesendet! ${selected.length} Adressen für ${plan.techniker}`,'ok');
    btn.textContent='✓ Gesendet!';
    setTimeout(()=>{btn.textContent='📤 An Techniker senden';btn.disabled=false;},3000);
  } catch(e){
    showToast('Fehler: '+e.message,'err');
    btn.textContent='📤 An Techniker senden';
    btn.disabled=false;
  }
}

function showToast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast '+type;
  setTimeout(()=>t.className='toast',3000);
}
</script>
